<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomit - Code Syntax Dark Mode (Mobile)</title>
    <style>
        /* Code Editor Dark Theme */
        :root {
            /* GitHub Dark Theme inspired */
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --border: #30363d;
            --border-light: #3c444d;
            
            /* Syntax Highlighting Colors */
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            
            --keyword: #ff7b72;      /* Red-Orange for keywords */
            --string: #a5d6ff;       /* Light Blue for strings */
            --function: #d2a8ff;     /* Purple for functions */
            --variable: #79c0ff;     /* Blue for variables */
            --constant: #56d364;     /* Green for constants */
            --comment: #8b949e;      /* Gray for comments */
            --type: #ffa657;         /* Orange for types */
            
            /* UI Colors */
            --accent: #58a6ff;       /* GitHub Blue */
            --success: #3fb950;      /* Green */
            --warning: #d29922;      /* Yellow */
            --danger: #f85149;       /* Red */
            
            /* Code Specific */
            --line-number: #6e7681;
            --selection: #264f78;
            
            --radius: 6px;
            --shadow: 0 8px 24px rgba(1, 4, 9, 0.8);
            --font-mono: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header - File Tab Style */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .file-tabs {
            display: flex;
            gap: 0.25rem;
            min-width: min-content;
        }

        .file-tab {
            padding: 0.5rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .file-tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--border-light);
            border-bottom: 1px solid var(--bg-primary);
            margin-bottom: -1px;
        }

        .file-tab .icon {
            margin-right: 0.25rem;
            font-size: 12px;
        }

        /* Code Container */
        .code-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .code-header {
            background: var(--bg-secondary);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (min-width: 768px) {
            .code-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .code-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .code-title .icon {
            color: var(--accent);
        }

        .code-body {
            padding: 1rem;
            position: relative;
        }

        @media (min-width: 768px) {
            .code-body {
                padding: 1.5rem;
            }
        }

        /* Line Numbers - Hide on mobile */
        .line-numbers {
            position: absolute;
            left: 0;
            top: 1rem;
            padding: 0 0.75rem;
            color: var(--line-number);
            text-align: right;
            user-select: none;
            font-size: 12px;
            display: none;
        }

        @media (min-width: 768px) {
            .line-numbers {
                display: block;
                top: 1.5rem;
                padding: 0 1rem;
                font-size: 13px;
            }
        }

        .line-number {
            height: 1.6em;
            display: block;
        }

        .code-content {
            font-family: var(--font-mono);
            font-size: 13px;
        }

        @media (min-width: 768px) {
            .code-content {
                margin-left: 3rem;
                font-size: 13px;
            }
        }

        /* Syntax Highlighting */
        .line {
            display: flex;
            align-items: flex-start;
            min-height: 1.6em;
            padding-left: 0.5rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 768px) {
            .line {
                padding-left: 1rem;
            }
        }

        .indent-1 { padding-left: 1.5rem; }
        .indent-2 { padding-left: 3rem; }
        .indent-3 { padding-left: 4.5rem; }

        @media (min-width: 768px) {
            .indent-1 { padding-left: 2rem; }
            .indent-2 { padding-left: 4rem; }
            .indent-3 { padding-left: 6rem; }
        }

        .keyword { color: var(--keyword); }
        .string { color: var(--string); }
        .function { color: var(--function); }
        .variable { color: var(--variable); }
        .constant { color: var(--constant); }
        .comment { color: var(--comment); font-style: italic; }
        .type { color: var(--type); }
        .number { color: var(--constant); }
        .operator { color: var(--text-primary); }
        .punctuation { color: var(--text-primary); }

        /* Status Indicators */
        .status-true { color: var(--success); }
        .status-false { color: var(--danger); }
        .status-pending { color: var(--warning); }

        /* Code Blocks */
        .code-block {
            margin: 1rem 0;
            border-left: 3px solid var(--border);
            padding-left: 0.75rem;
        }

        @media (min-width: 768px) {
            .code-block {
                margin: 1.5rem 0;
                padding-left: 1rem;
            }
        }

        .code-block-title {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (min-width: 768px) {
            .code-block-title {
                font-size: 12px;
            }
        }

        /* Stats in Code Style - Mobile Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin: 1rem 0;
        }

        @media (min-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
                margin: 1.5rem 0;
            }
        }

        .stat-line {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
            font-family: var(--font-mono);
        }

        @media (min-width: 768px) {
            .stat-line {
                padding: 1rem;
            }
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 0.25rem;
        }

        @media (min-width: 768px) {
            .stat-label {
                font-size: 12px;
                margin-bottom: 0.5rem;
            }
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .stat-value {
                font-size: 1.5rem;
            }
        }

        .stat-value .unit {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Habit Checkboxes in Code Style - Mobile friendly */
        .habit-checkbox {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-right: 0.5rem;
            vertical-align: middle;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .habit-checkbox {
                width: 14px;
                height: 14px;
                margin-right: 0.75rem;
            }
        }

        .habit-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .habit-checkbox.checked::after {
            content: "✓";
            position: absolute;
            top: -1px;
            left: 3px;
            color: var(--bg-primary);
            font-size: 11px;
        }

        @media (min-width: 768px) {
            .habit-checkbox.checked::after {
                left: 2px;
                font-size: 10px;
            }
        }

        /* Mobile Navigation */
        .mobile-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .mobile-nav {
                display: none;
            }
        }

        .mobile-nav-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            font-family: var(--font-mono);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 11px;
        }

        @media (min-width: 768px) {
            .footer {
                margin-top: 3rem;
                padding-top: 1.5rem;
                font-size: 12px;
            }
        }

        .footer .accent {
            color: var(--accent);
        }

        /* Interactive Elements - Touch friendly */
        .btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-family: var(--font-mono);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px; /* Minimum touch target size */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        @media (min-width: 768px) {
            .btn {
                padding: 0.5rem 1rem;
                font-size: 12px;
                min-height: auto;
            }
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: #4493f1;
            border-color: #4493f1;
            color: var(--bg-primary);
        }

        /* Mobile specific improvements */
        @media (max-width: 767px) {
            body {
                padding: 0.75rem;
                font-size: 13px;
            }
            
            .container {
                padding: 0;
            }
            
            .code-container {
                border-radius: var(--radius);
                margin-bottom: 1rem;
            }
            
            /* Improve touch targets */
            .file-tab {
                padding: 0.75rem 1rem;
                min-height: 44px;
            }
            
            /* Better scrolling for code lines */
            .line {
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none; /* Firefox */
            }
            
            .line::-webkit-scrollbar {
                display: none; /* Chrome, Safari */
            }
        }

        /* Tablet improvements */
        @media (min-width: 768px) and (max-width: 1023px) {
            body {
                padding: 1.5rem;
            }
            
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Mobile Navigation (only on mobile) -->
        <div class="mobile-nav">
            <button class="mobile-nav-btn">
                <span>☰</span>
                <span>Menu</span>
            </button>
            <button class="mobile-nav-btn">
                <span>⚡</span>
                <span>Today</span>
            </button>
            <button class="mobile-nav-btn">
                <span>📊</span>
                <span>Stats</span>
            </button>
        </div>

        <!-- File Tabs Header -->
        <div class="header">
            <div class="file-tabs">
                <div class="file-tab active">
                    <span class="icon">📁</span>
                    dashboard.js
                </div>
                <div class="file-tab">
                    <span class="icon">📁</span>
                    habits.js
                </div>
                <div class="file-tab">
                    <span class="icon">📁</span>
                    budget.js
                </div>
                <div class="file-tab">
                    <span class="icon">📁</span>
                    australia.js
                </div>
                <div class="file-tab">
                    <span class="icon">📁</span>
                    calendar.js
                </div>
            </div>
        </div>

        <!-- Main Dashboard Code -->
        <div class="code-container">
            <div class="code-header">
                <div class="code-title">
                    <span class="icon">📊</span>
                    <span>nomit-dashboard.js — Life Management System</span>
                </div>
                <div>Last updated: 2026-04-18</div>
            </div>

            <div class="code-body">
                <div class="line-numbers">
                    <span class="line-number">1</span>
                    <span class="line-number">2</span>
                    <span class="line-number">3</span>
                    <span class="line-number">4</span>
                    <span class="line-number">5</span>
                    <span class="line-number">6</span>
                    <span class="line-number">7</span>
                    <span class="line-number">8</span>
                    <span class="line-number">9</span>
                    <span class="line-number">10</span>
                </div>

                <div class="code-content">
                    <!-- Today's Focus -->
                    <div class="code-block">
                        <div class="code-block-title">// TODAY'S FOCUS</div>
                        <div class="line">
                            <span class="keyword">const</span> <span class="variable">todaysFocus</span> <span
